name: ReversionTV
options:
  bundleIdPrefix: app.reversion
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "V4G7X59853"
    TARGETED_DEVICE_FAMILY: "3"
    # Xcode "recommended settings" — set here so they persist across
    # `xcodegen generate` (clicking Perform Changes in Xcode only edits the
    # generated .xcodeproj, which gets overwritten on the next regen).
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ReversionTV:
    type: application
    platform: tvOS
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.reversion.tv
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "a948f668-b288-4e04-8f65-38fa60b9bbbb"
          DEVELOPMENT_TEAM: "V4G7X59853"
